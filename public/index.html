<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WCH Test Suite</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #0b1220; color: #e5e7eb; }
      .wrap { width: 100%; margin: 0; padding: 20px; box-sizing: border-box; }
      h1 { margin-top: 0; }
      .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      input { flex: 1; min-width: 260px; background: #0f172a; color: #e5e7eb; border: 1px solid #374151; border-radius: 8px; padding: 10px 12px; }
      button { background: #22c55e; color: #052e16; border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
      button:disabled { opacity: .6; cursor: wait; }
      .meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
      .pill { background: #0f172a; border: 1px solid #374151; border-radius: 8px; padding: 8px 10px; font-size: 14px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
      th, td { border-bottom: 1px solid #1f2937; padding: 8px; text-align: left; vertical-align: top; overflow-wrap: anywhere; }
      th { background: #111827; }
      .ok { color: #4ade80; font-weight: 700; }
      .bad { color: #f87171; font-weight: 700; }
      .warn { color: #fbbf24; font-weight: 700; }
      .small { font-size: 12px; color: #9ca3af; }
      .error { color: #fecaca; background: #7f1d1d; border: 1px solid #991b1b; border-radius: 8px; padding: 10px; }
      a { color: #93c5fd; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>WCH Test Suite</h1>
      <p class="small">Compare Webflow.io and WCH URL pages, links, and assets with status codes.</p>

      <div class="card">
        <div class="row">
          <input id="urlA" placeholder="https://webflow.io-site.com" />
          <input id="urlB" placeholder="https://your-wch-url.com/subdir/" />
          <button id="runBtn">Compare</button>
        </div>
      </div>

      <div id="error" style="display:none" class="error"></div>
      <div id="summaryCard" class="card" style="display:none"></div>
      <div id="sitemapCard" class="card" style="display:none"></div>

      <div id="tableCard" class="card" style="display:none">
        <h3>Page URL Comparison</h3>
        <table id="resultsTable"></table>
      </div>

      <div id="linksSummaryCard" class="card" style="display:none"></div>
      <div id="linksTableCard" class="card" style="display:none">
        <h3>Links Comparison</h3>
        <table id="linksTable"></table>
      </div>

      <div id="assetsSummaryCard" class="card" style="display:none"></div>
      <div id="assetsTableCard" class="card" style="display:none">
        <h3>Assets Comparison</h3>
        <table id="assetsTable"></table>
      </div>
    </div>

    <script>
      const runBtn = document.getElementById('runBtn');
      const urlAInput = document.getElementById('urlA');
      const urlBInput = document.getElementById('urlB');
      const errorEl = document.getElementById('error');
      const summaryCard = document.getElementById('summaryCard');
      const sitemapCard = document.getElementById('sitemapCard');
      const tableCard = document.getElementById('tableCard');
      const table = document.getElementById('resultsTable');
      const linksSummaryCard = document.getElementById('linksSummaryCard');
      const linksTableCard = document.getElementById('linksTableCard');
      const linksTable = document.getElementById('linksTable');
      const assetsSummaryCard = document.getElementById('assetsSummaryCard');
      const assetsTableCard = document.getElementById('assetsTableCard');
      const assetsTable = document.getElementById('assetsTable');

      const LS_KEY_A = 'sitemapCopyVerifier.urlA';
      const LS_KEY_B = 'sitemapCopyVerifier.urlB';

      const savedA = localStorage.getItem(LS_KEY_A);
      const savedB = localStorage.getItem(LS_KEY_B);
      if (savedA) urlAInput.value = savedA;
      if (savedB) urlBInput.value = savedB;

      urlAInput.addEventListener('input', () => localStorage.setItem(LS_KEY_A, urlAInput.value.trim()));
      urlBInput.addEventListener('input', () => localStorage.setItem(LS_KEY_B, urlBInput.value.trim()));

      function esc(str) {
        return String(str ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
      }

      function statusPills(statusCodes = {}) {
        const entries = Object.entries(statusCodes).sort((a, b) => Number(a[0]) - Number(b[0]));
        if (!entries.length) return '<div class="pill">No status codes captured</div>';
        return entries.map(([code, count]) => `<div class="pill">HTTP ${esc(code)}: <strong>${count}</strong></div>`).join('');
      }

      function renderRefTable(targetTable, rows) {
        targetTable.innerHTML = `
          <thead>
            <tr>
              <th>Path Key</th><th>Webflow.io URL</th><th>WCH URL</th><th>Webflow Status</th><th>WCH Status</th><th>Copy Result</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${esc(r.key)}</td>
                <td>${r.urlA ? `<a href="${esc(r.urlA)}" target="_blank">${esc(r.urlA)}</a>` : '<span class="warn">Missing</span>'}</td>
                <td>${r.urlB ? `<a href="${esc(r.urlB)}" target="_blank">${esc(r.urlB)}</a>` : '<span class="warn">Missing</span>'}</td>
                <td>${r.statusA ?? '-'} ${r.availableA ? '<span class="ok">OK</span>' : (r.inA ? '<span class="bad">FAIL</span>' : '')}</td>
                <td>${r.statusB ?? '-'} ${r.availableB ? '<span class="ok">OK</span>' : (r.inB ? '<span class="bad">FAIL</span>' : '')}</td>
                <td>${r.copySuccess ? '<span class="ok">SUCCESS</span>' : '<span class="bad">NOT MATCHED</span>'}</td>
              </tr>`).join('')}
          </tbody>
        `;
      }

      runBtn.addEventListener('click', async () => {
        errorEl.style.display = 'none';
        summaryCard.style.display = 'none';
        sitemapCard.style.display = 'none';
        tableCard.style.display = 'none';
        linksSummaryCard.style.display = 'none';
        linksTableCard.style.display = 'none';
        assetsSummaryCard.style.display = 'none';
        assetsTableCard.style.display = 'none';
        runBtn.disabled = true;
        runBtn.textContent = 'Comparing...';

        try {
          const urlA = urlAInput.value.trim();
          const urlB = urlBInput.value.trim();

          const res = await fetch('/api/compare', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ urlA, urlB }),
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Compare failed');

          const s = data.summary;
          summaryCard.innerHTML = `
            <h3>Page Summary</h3>
            <div class="meta">
              <div class="pill">Total Path Keys: <strong>${s.totalKeys}</strong></div>
              <div class="pill">Present in Both: <strong>${s.presentInBoth}</strong></div>
              <div class="pill">Only in Webflow.io: <strong>${s.onlyInA}</strong></div>
              <div class="pill">Only in WCH URL: <strong>${s.onlyInB}</strong></div>
              <div class="pill">Copy Success Rows: <strong>${s.copySuccess}</strong></div>
              <div class="pill">Availability Failures: <strong>${s.failedAvailability}</strong></div>
            </div>
            <h4>Status Codes (pages)</h4>
            <div class="meta">${statusPills(s.statusCodes)}</div>
          `;
          summaryCard.style.display = 'block';

          const aMap = (data.sitemaps.siteA || []).map(u => `<li><a href="${esc(u)}" target="_blank">${esc(u)}</a></li>`).join('');
          const bMap = (data.sitemaps.siteB || []).map(u => `<li><a href="${esc(u)}" target="_blank">${esc(u)}</a></li>`).join('');
          sitemapCard.innerHTML = `
            <h3>Sitemaps Checked</h3>
            <div class="row">
              <div style="flex:1;min-width:300px"><strong>Webflow.io</strong><ul>${aMap || '<li>None found</li>'}</ul></div>
              <div style="flex:1;min-width:300px"><strong>WCH URL</strong><ul>${bMap || '<li>None found</li>'}</ul></div>
            </div>
          `;
          sitemapCard.style.display = 'block';

          const rows = data.rows || [];
          table.innerHTML = `
            <thead>
              <tr>
                <th>Path Key</th><th>Webflow.io URL</th><th>WCH URL</th><th>Webflow Status</th><th>WCH Status</th><th>Copy Result</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(r => `
                <tr>
                  <td>${esc(r.key)}</td>
                  <td>${r.urlA ? `<a href="${esc(r.urlA)}" target="_blank">${esc(r.urlA)}</a>` : '<span class="warn">Missing</span>'}</td>
                  <td>${r.urlB ? `<a href="${esc(r.urlB)}" target="_blank">${esc(r.urlB)}</a>` : '<span class="warn">Missing</span>'}</td>
                  <td>${r.statusA ?? '-'} ${r.availableA ? '<span class="ok">OK</span>' : (r.inA ? '<span class="bad">FAIL</span>' : '')}</td>
                  <td>${r.statusB ?? '-'} ${r.availableB ? '<span class="ok">OK</span>' : (r.inB ? '<span class="bad">FAIL</span>' : '')}</td>
                  <td>${r.copySuccess ? '<span class="ok">SUCCESS</span>' : '<span class="bad">NOT MATCHED</span>'}</td>
                </tr>`).join('')}
            </tbody>
          `;
          tableCard.style.display = 'block';

          const refRows = data.referenceRows || [];
          const linkRows = refRows.filter(r => r.type === 'link');
          const assetRows = refRows.filter(r => r.type === 'asset');

          const linkStatus = {};
          for (const r of linkRows) {
            if (r.statusA != null) linkStatus[r.statusA] = (linkStatus[r.statusA] || 0) + 1;
            if (r.statusB != null) linkStatus[r.statusB] = (linkStatus[r.statusB] || 0) + 1;
          }
          linksSummaryCard.innerHTML = `
            <h3>Links Summary</h3>
            <div class="meta">
              <div class="pill">Total Links: <strong>${linkRows.length}</strong></div>
              <div class="pill">Only in Webflow.io: <strong>${linkRows.filter(r => r.inA && !r.inB).length}</strong></div>
              <div class="pill">Only in WCH URL: <strong>${linkRows.filter(r => !r.inA && r.inB).length}</strong></div>
              <div class="pill">Present in Both: <strong>${linkRows.filter(r => r.inA && r.inB).length}</strong></div>
            </div>
            <h4>Status Codes (links)</h4>
            <div class="meta">${statusPills(linkStatus)}</div>
          `;
          linksSummaryCard.style.display = 'block';
          renderRefTable(linksTable, linkRows);
          linksTableCard.style.display = 'block';

          const assetStatus = {};
          for (const r of assetRows) {
            if (r.statusA != null) assetStatus[r.statusA] = (assetStatus[r.statusA] || 0) + 1;
            if (r.statusB != null) assetStatus[r.statusB] = (assetStatus[r.statusB] || 0) + 1;
          }
          assetsSummaryCard.innerHTML = `
            <h3>Assets Summary</h3>
            <div class="meta">
              <div class="pill">Total Assets: <strong>${assetRows.length}</strong></div>
              <div class="pill">Only in Webflow.io: <strong>${assetRows.filter(r => r.inA && !r.inB).length}</strong></div>
              <div class="pill">Only in WCH URL: <strong>${assetRows.filter(r => !r.inA && r.inB).length}</strong></div>
              <div class="pill">Present in Both: <strong>${assetRows.filter(r => r.inA && r.inB).length}</strong></div>
            </div>
            <h4>Status Codes (assets)</h4>
            <div class="meta">${statusPills(assetStatus)}</div>
          `;
          assetsSummaryCard.style.display = 'block';
          renderRefTable(assetsTable, assetRows);
          assetsTableCard.style.display = 'block';
        } catch (err) {
          errorEl.textContent = err.message || 'Unknown error';
          errorEl.style.display = 'block';
        } finally {
          runBtn.disabled = false;
          runBtn.textContent = 'Compare';
        }
      });
    </script>
  </body>
</html>
